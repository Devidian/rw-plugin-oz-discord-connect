# ---------------------- Important plugin settings ---------------------
# Set these values according to your server setup.

# General
logLevel=ALL
sendPluginWelcome=false
joinDiscord=

# ---------------------- Discord Bot settings --------------------------
# On small servers the bot can cause OutOfMemory crashes. In that case keep botEnable=false.
botEnable=false
# Your bot token from https://discord.com/developers/applications/<YOUR_APP_ID>/bot
botToken=
# Enable admin-only bot commands. If false, command permissions are controlled only via botCMD* values.
botSecure=true
# Language used for Discord commands because the bot cannot determine it automatically.
botLang=en
# Additional Discord users allowed to execute secure commands.
# Example: botAdmins=Name1#1234,Name2#1235
botAdmins=
# Discord channel name from which bot chat messages should be picked up ingame.
botChatChannelName=server-chat

### Discord commands
# 0 = disabled, 1 = available to everyone, 2 = admin only
botCMDhelp=1
botCMDversion=1
botCMDonline=1
botCMDweather=1
botCMDtime=1
botCMDbanned=1
botCMDrestart=2
botCMDsupport=2
botCMDkick=2
botCMDban=2
botCMDgroup=2
botCMDyell=2
botCMDbroadcast=2
botCMDbc=2
botCMDunban=2
botCMDtptp=2
botCMDmkadmin=2
botCMDunadmin=2
botCMDsetweather=2
botCMDsettime=2
botCMDsethealth=2
botCMDsethunger=2
botCMDsetthirst=2
botCMDreloadplugins=2

# ---------------------- Webhooks / channel targets --------------------
# Use webhook URLs if you want Discord output through webhooks.
webHookEventUrl=
webHookStatusUrl=
webHookSupportUrl=
webHookChatUrl=

# Use channel IDs if you want the bot to write directly instead of using webhooks.
eventChannelId=0
chatChannelId=0
statusChannelId=0
supportChannelId=0

# These only apply if you use webhooks.
overrideAvatar=true
useServerName=false
statusUsername=

# ---------------------- Message routing -------------------------------
# Chat to Discord
postChat=false
# Support messages `/support [text]` to Discord
postSupport=false
# Server status messages to Discord
reportServerStatus=true
reportSettingsChanged=true
reportJarChanged=true

# Add a screenshot to support messages by default
supportScreenshot=true
# If true, the teleport command will be added to teleport to the coords where the player sent the message
addTeleportCommand=true

# ---------------------- Restart settings ------------------------------
# Allow ingame restart command
allowRestart=false
# Allow non-admin players to set the restart flag
restartAdminOnly=false
# Minimum time a player must have played on the server to trigger restart
restartMinimumTime=86400
# Enable or disable scheduled restart feature
restartTimed=false
# Scheduled restart times, multiple values separated by |
restartTimes=00:00
# Force restart after this time in minutes, 0 disables forced restart
forceRestartAfter=0
# If true the server will be shut down instead of restarted
useShutdownNotRestart=true

# ---------------------- Screenshot settings ---------------------------
# Allows players to use '+screen', '+s ', '+screennogui', '+sng ' in chat
allowScreenshots=true
# Maximum screenshot width
maxScreenWidth=1920

# ---------------------- Color & chat settings -------------------------
colorizeChat=true
showGroup=false
colorSupport=<color=#782d8e>
colorLocalSelf=<color=#ddffdd>
colorLocalAdmin=<color=#db3208>
colorLocalOther=<color=#dddddd>
colorLocalDiscord=<color=#ddddff>
defaultChatPrefix=[🗣️:**PH_LANGUAGE**] 
discordChatSyntax=[🕹️:**PH_LANGUAGE**] **PH_PLAYER**: **PH_MESSAGE**

# ---------------------- Notes ----------------------------------------
# Deprecated / removed:
# postStatus is no longer used. Use reportServerStatus instead.
