TC_DISCORD_HELP_SHORT=Этот плагин использует slash-команды, введите `/`, чтобы начать.
;TC_DISCORD_HELP=Доступные в данный момент команды\n\
```md\n\
|command                        |description                                                                                |\n\
|-------------------------------|-------------------------------------------------------------------------------------------|\n\
| Информационные команды        |                                                                                           |\n\
| /help                         | показывает это сообщение                                                                  |\n\
| /version                      | показывает установленную версию плагина                                                   |\n\
| /online                       | показывает список игроков, которые сейчас онлайн                                          |\n\
| /getweather                   | показывает текущую и следующую погоду                                                     |\n\
| /gettime                      | показывает текущее внутриигровое время (часы:минуты)                                      |\n\
| /getbanned                    | показывает список забаненных игроков                                                      |\n\
| Административные команды      |                                                                                           |\n\
| /restart                      | ставит флаг перезапуска, если игроки онлайн, или сразу перезапускает сервер               |\n\
| /support                      | отправляет TEXT игроку PLAYERNAME как сообщение [SUPPORT]                                 |\n\
| /kick                         | кикает игрока с сервера, причина необязательна                                            |\n\
| /ban                          | банит игрока на сервере, длительность и причина необязательны                             |\n\
| /group                        | устанавливает группу игрока                                                               |\n\
| /yell                         | отправляет TEXT через yell                                                                |\n\
| /bc                           | отправляет TEXT всем как сообщение [TYPE]                                                 |\n\
| /unban                        | разбанивает игрока по UID                                                                 |\n\
| /teleporttoplayer PA PB       | телепортирует игрока A к игроку B, если оба онлайн                                        |\n\
| /mkadmin                      | выдаёт игроку статус администратора                                                       |\n\
| /unadmin                      | снимает с игрока статус администратора                                                    |\n\
| /setweather                   | устанавливает погоду в игре                                                               |\n\
| /settime                      | устанавливает время в игре                                                                |\n\
| /sethealth                    | устанавливает значение `health` игрока на `value`                                         |\n\
| /sethunger                    | устанавливает значение `hunger` игрока на `value`                                         |\n\
| /setthirst                    | устанавливает значение `thirst` игрока на `value`                                         |\n\
```\n
