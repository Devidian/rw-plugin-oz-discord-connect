TC_CMD_INFO=ОПИСАНИЕ\n\
Этот плагин предназначен для интеграции сервера RisingWorld в Discord.\n\
Отправляются 4 вида сообщений:\n\
1. Сообщения поддержки, отправленные командой PH_CMD_SUPPORT\n\
2. Сообщения из локального чата\n\
3. Сообщения о состоянии сервера (плагин включён/выключен, игрок подключился или отключился, файлы изменены)\n\
4. (Если включено) сообщения о погибших ездовых и неагрессивных животных, а также\n\
   об удалении или уничтожении подбираемых объектов (например, верстака)\n\
\n\
• Если Discord-бот активирован в settings.properties, администратор может писать\n\
сообщения поддержки из Discord одному игроку или всем игрокам.\n\
• Можно определить канал Discord, чтобы писать из Discord в локальный игровой чат.\n\
• Если в сообщении написать "+screen" (или "+s "), снимок экрана будет отправлен в канал Discord.\n\
• Если в сообщении написать "+screennogui" (или "+sng "), снимок экрана без интерфейса будет отправлен в канал Discord.\n\
• Если в сообщении написать "+tp ", ваши координаты будут отправлены в чат и в Discord.\n\
\n\
Дополнительно доступны несколько вспомогательных административных команд.\n\
Для получения дополнительной информации введите PH_CMD_HELP\n\

TC_CMD_HELP=Использование плагина\n\
PH_CMD_SUPPORT  | отправляет сообщение в канал поддержки Discord\n\
