TC_DISCORD_HELP_SHORT=This plugin uses slash commands, type `/` to begin.
;TC_DISCORD_HELP=Currently available commands\n\
```md\n\
|command                        |description                                                                                |\n\
|-------------------------------|-------------------------------------------------------------------------------------------|\n\
| Informational commands        |                                                                                           |\n\
| /help                         | shows this message                                                                        |\n\
| /version                      | shows the currently installed plugin version                                              |\n\
| /online                       | shows a list of players currently online                                                  |\n\
| /getweather                   | shows the current and next weather                                                        |\n\
| /gettime                      | shows the current in-game time (hours:minutes)                                            |\n\
| /getbanned                    | shows a list of banned players                                                            |\n\
| Administrative commands       |                                                                                           |\n\
| /restart                      | sets the restart flag if players are online or restarts the server immediately            |\n\
| /support                      | sends TEXT to PLAYERNAME as a [SUPPORT] message                                           |\n\
| /kick                         | kicks a player from the server, reason is optional                                        |\n\
| /ban                          | bans a player from the server, duration and reason are optional                           |\n\
| /group                        | sets a player's group                                                                     |\n\
| /yell                         | sends TEXT via yell                                                                       |\n\
| /bc                           | sends TEXT to everyone as a [TYPE] message                                                |\n\
| /unban                        | unbans a player by UID                                                                    |\n\
| /teleporttoplayer PA PB       | teleports player A to player B if both are online                                         |\n\
| /mkadmin                      | grants a player admin status                                                              |\n\
| /unadmin                      | revokes a player's admin status                                                           |\n\
| /setweather                   | sets the weather in the game                                                              |\n\
| /settime                      | sets the time in the game                                                                 |\n\
| /sethealth                    | sets a player's `health` value to `value`                                                 |\n\
| /sethunger                    | sets a player's `hunger` value to `value`                                                 |\n\
| /setthirst                    | sets a player's `thirst` value to `value`                                                 |\n\
```\n
