TC_CMD_INFO=DESCRIPTION\n\
This plugin is used to integrate a RisingWorld server into Discord.\n\
It sends 4 types of messages:\n\
1. Support messages sent with command PH_CMD_SUPPORT\n\
2. Messages from the local chat\n\
3. Server status messages (plugin on/off, player dis-connected, files changed)\n\
4. (If enabled) notifications about killed mounts and non-hostile animals as well as\n\
   removing or destroying collectible objects (e.g. workbench)\n\
\n\
• If the Discord bot is enabled in settings.properties, an admin can write\n\
support messages from Discord to one or all players.\n\
• A Discord channel can be defined so that messages from Discord can be written\n\
to the in-game local chat.\n\
• If "+screen" (or "+s ") is written in a message, a screenshot is sent to the Discord channel.\n\
• If "+screennogui" (or "+sng ") is written in a message, a screenshot without interface is sent to the Discord channel.\n\
• If "+tp " is written in a message, your coordinates are sent to chat and Discord.\n\
\n\
Additionally, there are a few supporting admin commands.\n\
For more information type PH_CMD_HELP\n\

TC_CMD_HELP=Plugin usage\n\
PH_CMD_SUPPORT  | send a message to the support Discord channel\n\
PH_CMD_JOIN     | join the Discord server\n\
PH_CMD_RESTART  | restart the server once all players have left\n\
PH_CMD_HELP     | lists all available commands\n\
PH_CMD_INFO     | prints the plugin description\n\
PH_CMD_STATUS   | prints the current plugin status\n\

