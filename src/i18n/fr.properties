TC_CMD_INFO=DESCRIPTION\n\
Ce plugin sert à intégrer un serveur RisingWorld dans Discord.\n\
4 types de messages sont envoyés :\n\
1. Les messages de support envoyés avec la commande PH_CMD_SUPPORT\n\
2. Les messages du chat local\n\
3. Les messages d'état du serveur (plugin activé/désactivé, joueur connecté/déconnecté, fichiers modifiés)\n\
4. (Si activé) les notifications concernant les montures et animaux non hostiles tués, ainsi que\n\
   la suppression ou destruction d'objets récupérables (par ex. établi)\n\
\n\
• Si le bot Discord est activé dans settings.properties, un administrateur peut écrire\n\
des messages de support depuis Discord à un ou à tous les joueurs.\n\
• Un canal Discord peut être défini pour écrire depuis Discord dans le chat local du jeu.\n\
• Si "+screen" (ou "+s ") est écrit dans un message, une capture d'écran est envoyée au canal Discord.\n\
• Si "+screennogui" (ou "+sng ") est écrit dans un message, une capture d'écran sans interface est envoyée au canal Discord.\n\
• Si "+tp " est écrit dans un message, vos coordonnées sont envoyées au chat et à Discord.\n\
\n\
En plus, quelques commandes d'administration utiles sont disponibles.\n\
Pour plus d'informations, tapez PH_CMD_HELP\n\

