TC_DISCORD_HELP_SHORT=Ce plugin utilise des commandes slash, tapez `/` pour commencer.
;TC_DISCORD_HELP=Commandes actuellement disponibles\n\
```md\n\
|command                        |description                                                                                |\n\
|-------------------------------|-------------------------------------------------------------------------------------------|\n\
| Commandes d'information       |                                                                                           |\n\
| /help                         | affiche ce message                                                                        |\n\
| /version                      | affiche la version actuellement installée du plugin                                       |\n\
| /online                       | affiche une liste des joueurs actuellement en ligne                                       |\n\
| /getweather                   | affiche la météo actuelle et la suivante                                                  |\n\
| /gettime                      | affiche l'heure actuelle en jeu (heures:minutes)                                          |\n\
| /getbanned                    | affiche une liste des joueurs bannis                                                      |\n\
| Commandes administratives     |                                                                                           |\n\
| /restart                      | active le drapeau de redémarrage si des joueurs sont en ligne ou redémarre le serveur     |\n\
| /support                      | envoie TEXT à PLAYERNAME comme message [SUPPORT]                                          |\n\
| /kick                         | expulse un joueur du serveur, la raison est facultative                                   |\n\
| /ban                          | bannit un joueur du serveur, la durée et la raison sont facultatives                      |\n\
| /group                        | définit le groupe d'un joueur                                                             |\n\
| /yell                         | envoie TEXT via yell                                                                      |\n\
| /bc                           | envoie TEXT à tous comme message [TYPE]                                                   |\n\
| /unban                        | débannit un joueur par son UID                                                            |\n\
| /teleporttoplayer PA PB       | téléporte le joueur A vers le joueur B si les deux sont en ligne                          |\n\
| /mkadmin                      | donne le statut administrateur à un joueur                                                |\n\
| /unadmin                      | retire le statut administrateur à un joueur                                               |\n\
| /setweather                   | définit la météo dans le jeu                                                              |\n\
| /settime                      | définit l'heure dans le jeu                                                               |\n\
| /sethealth                    | définit la valeur `health` d'un joueur à `value`                                          |\n\
| /sethunger                    | définit la valeur `hunger` d'un joueur à `value`                                          |\n\
| /setthirst                    | définit la valeur `thirst` d'un joueur à `value`                                          |\n\
```\n
